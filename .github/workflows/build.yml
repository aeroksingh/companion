name: Build Companion

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you trigger manually from GitHub UI

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout code ──────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ──────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Setup Rust ─────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # ── 4. Cache Rust build (speeds up future builds a lot) ───
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── 5. Install frontend dependencies ─────────────────────
      - name: Install frontend deps
        run: npm ci

      # ── 6. Install + build sidecar ───────────────────────────
      - name: Install sidecar deps
        working-directory: sidecar
        run: npm ci

      - name: Build sidecar TypeScript
        working-directory: sidecar
        run: npm run build

      # ── 7. Bundle sidecar into single .exe ───────────────────
      - name: Install pkg globally
        run: npm install -g pkg

      - name: Bundle sidecar exe
        working-directory: sidecar
        run: |
          pkg dist/index.js `
            --target node18-win-x64 `
            --output ../src-tauri/sidecars/companion-pipeline-x86_64-pc-windows-msvc.exe

      
      # ── 8. Build Tauri app ────────────────────────────────────
      - name: Build Tauri
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      # ── 9. Upload installer as downloadable artifact ─────────
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Companion-Windows-Installer
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30
